name: Deploy Weather App to GitHub Pages

on:
  push:
    branches:
      - main
  # Allow manual re-deploys from the Actions tab
  workflow_dispatch:

# Grant the workflow permission to write to the gh-pages branch
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: weather-radar-app/package-lock.json

      - name: Install dependencies
        working-directory: weather-radar-app
        run: npm ci

      - name: Build project
        working-directory: weather-radar-app
        run: npm run build

      - name: Deploy to GitHub Pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Build is already done; dist/ is at weather-radar-app/dist
          
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          
          # Fetch gh-pages branch from origin and switch to it
          git fetch origin gh-pages:gh-pages 2>/dev/null || true
          git checkout gh-pages || git checkout --orphan gh-pages
          
          # Remove all existing files except .git
          find . -mindepth 1 -not -path './.git/*' -delete
          
          # Copy dist files to repo root
          cp -r weather-radar-app/dist/* .
          
          # Create .nojekyll to prevent Jekyll processing
          touch .nojekyll
          
          # Commit and push
          git add -A
          if ! git diff-index --quiet HEAD --; then
            git commit -m "Deploy: $(git rev-parse --short origin/main)"
