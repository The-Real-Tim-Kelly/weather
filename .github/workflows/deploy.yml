name: Deploy Weather App to GitHub Pages

on:
  push:
    branches:
      - main
  # Allow manual re-deploys from the Actions tab
  workflow_dispatch:

# Grant the workflow permission to write to the gh-pages branch
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: weather-radar-app/package-lock.json

      - name: Install dependencies
        working-directory: weather-radar-app
        run: npm ci

      - name: Build project
        working-directory: weather-radar-app
        run: npm run build

      - name: Deploy to GitHub Pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd weather-radar-app
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          
          # Create gh-pages branch if it doesn't exist and switch to it
          if git rev-parse --verify gh-pages >/dev/null 2>&1; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
          fi
          
          # Copy dist files to root and commit
          cp -r dist/* .
          git add -A
          
          # Only commit if there are changes
          if ! git diff-index --quiet HEAD --; then
            git commit -m "Deploy from main: $(git rev-parse --short origin/main)"
            git push -u origin gh-pages --force
          else
            echo "No changes to deploy"
          fi
