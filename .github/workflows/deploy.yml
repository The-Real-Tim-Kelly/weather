name: Deploy Weather App to GitHub Pages

on:
  push:
    branches:
      - main
  # Allow manual re-deploys from the Actions tab
  workflow_dispatch:

# Grant the workflow permission to write to the gh-pages branch
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: weather-radar-app/package-lock.json

      - name: Install dependencies
        working-directory: weather-radar-app
        run: npm ci

      - name: Build project
        working-directory: weather-radar-app
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./weather-radar-app/dist
          # Keep the gh-pages branch clean on every deploy
          force_orphan: true
          # Ensure single-page app routing works by adding a 404.html fallback
          enable_jekyll: false
