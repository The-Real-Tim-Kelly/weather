name: Deploy Weather App to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: weather-radar-app/package-lock.json

      - name: Install dependencies
        working-directory: weather-radar-app
        run: npm ci

      - name: Build project
        working-directory: weather-radar-app
        run: npm run build

      - name: Deploy to GitHub Pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          
          # Copy dist files FIRST (before switching branches, while they exist on main)
          cp -r weather-radar-app/dist /tmp/dist_build
          
          # Fetch and checkout gh-pages branch
          git fetch origin gh-pages:gh-pages 2>/dev/null || true
          git checkout gh-pages || git checkout --orphan gh-pages
          
          # Remove all old files except .git
          ls -A | grep -v "^\.git$" | xargs rm -rf
          
          # Copy dist files to repo root
          cp -r /tmp/dist_build/* .
          
          # Create .nojekyll
          touch .nojekyll
          
          # Commit and push
          git add -A
          if ! git diff-index --quiet HEAD --; then
            git commit -m "Deploy: $(git rev-parse --short origin/main)"
            git push -u origin gh-pages --force
          fi
