<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Sun rays -->
  <g stroke="#FBBF24" stroke-width="3" stroke-linecap="round">
    <line x1="22" y1="10" x2="22" y2="5"/>
    <line x1="10" y1="22" x2="5" y2="22"/>
    <line x1="13.5" y1="13.5" x2="9.8" y2="9.8"/>
    <line x1="30.5" y1="13.5" x2="34.2" y2="9.8"/>
    <line x1="13.5" y1="30.5" x2="9.8" y2="34.2"/>
  </g>
  <!-- Sun body -->
  <circle cx="22" cy="22" r="10" fill="#FDE68A" stroke="#FBBF24" stroke-width="1.5"/>
  <!-- Cloud -->
  <ellipse cx="36" cy="36" rx="16" ry="10" fill="#E0F2FE" stroke="#60A5FA" stroke-width="1.5"/>
  <circle cx="25" cy="38" r="8"  fill="#E0F2FE" stroke="#60A5FA" stroke-width="1.5"/>
  <circle cx="33" cy="33" r="10" fill="#E0F2FE" stroke="#60A5FA" stroke-width="1.5"/>
  <circle cx="43" cy="37" r="7"  fill="#E0F2FE" stroke="#60A5FA" stroke-width="1.5"/>
  <!-- Flat cloud bottom cover (hides lower arc seams) -->
  <rect x="17" y="37" width="36" height="9" fill="#E0F2FE"/>
  <!-- Rain drops -->
  <g fill="#3B82F6">
    <ellipse cx="26" cy="52" rx="2" ry="3"/>
    <ellipse cx="36" cy="55" rx="2" ry="3"/>
    <ellipse cx="46" cy="52" rx="2" ry="3"/>
  </g>
</svg>
